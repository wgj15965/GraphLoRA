datasets:
  amazon_ood:
    # path: /home/sist/zyang/LLM/MiniGPT-4/dataset/ml-100k/  #"~/LLM/MiniGPT-4/dataset/ml-100k/"
    path: /mnt/disk2/wgj/wgj_collm/collm-datasets/ml-1m/ml-1m/
    train_file: train_ood2.pkl
    val_file: valid_ood2.pkl
    test_file: test_ood2.pkl
    # path: "~/LLM/MiniGPT-4/dataset/ml-1m/"`
    # path: /home/sist/zyang/LLM/datasets/ml-1m
    data_type: default
    build_info:
      # storage: /path/to/cc_sbu_dataset/{00000..01255}.tar
      # storage: /home/sist/zyang/LLM/MiniGPT-4/dataset/ml-100k/ #~/LLM/MiniGPT-4/dataset/ml-100k/
      storage: /mnt/disk2/wgj/wgj_collm/collm-datasets/ml-1m/ml-1m/
      # storage: /home/sist/zyang/LLM/datasets/ml-1m/

run:
  task: rec_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 8e-5
  warmup_lr: 1e-5
  mode: 'v2' # always, please not change it


  weight_decay: 1e-3 # by default
  max_epoch: 500
  iters_per_epoch: 1000 #100
  batch_size_train: 1 # 8
  batch_size_eval: 16 # 32
  num_workers: 0
  warmup_steps: 200

  seed: 42
  output_dir: /mnt/disk2/wgj/wgj_collm/CoRA/movie_collm_1216 #log and model saving path

  amp: True
  resume_ckpt_path: null

  evaluate: True # False: training, True: only evaluation
  train_splits: ["train"] 
  valid_splits: ["valid"] # validation set
  test_splits: ["test"] # ,,"test", "valid", "test_warm" ,"test_cold" ,

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: False