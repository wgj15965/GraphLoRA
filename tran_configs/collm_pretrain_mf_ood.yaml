model:
  arch: mini_gpt4rec_v2 # by default
  model_type: pretrain_vicuna
  freeze_rec: False  #
  freeze_proj: False #
  freeze_lora: False #
  max_txt_len: 1024 # by default
  proj_token_num: 1 # default:1,  the number of text token embeddings that the A single ID embedding is converted into
  proj_drop: 0 # by default
  proj_mid_times: 10 # proj_mid_times * rec embedding size = the middle layer size of the mapping module
  end_sym: "###"
  prompt_path: "prompts/collm_movie.txt"
  prompt_template: '{}'
  llama_model: "/mnt/disk2/wgj/wgj_collm/vicuna-7b-v1.1" #vicuna path
  user_num: -100
  item_num: -100
  lora_gnn: "ngcf"  # 'lightgcn', 'ngcf', 'graphsage', 'gat' , 'gcn'
  lora_scale: 1.0
  gnn_scale: 0.1
  gcn_layer: 31
  dataset: movie
  ans_type: 'v2' # by default
  rec_model: "MF" #[MF, lightgcn,.....], see "Rec2Base" class in  minigpt4/models/rec_model.py
  lora_config:
    use_lora: True
    r: 8
    alpha: 16
    target_modules: ["q_proj", "v_proj"] # ,"k_proj","up_proj","down_proj"
    dropout: 0.05
  rec_config: # recommender model config
    user_num: -100
    item_num: -100
    embedding_size: 256 #embedding size
    pretrained_path: not_have
# /mnt/disk2/wgj_collm/weight_best/0912_ml1m_oodv2_best_model_d256lr-0.001wd0.0001.pth

  ckpt: /mnt/disk2/wgj/wgj_collm/CoRA/movie_collm/20251216162/checkpoint_best.pth # used for CIE tuning or evaluation

#  /mnt/disk2/wgj/wgj_collm/weight_best/tallrec_ml_best_32000.pth


